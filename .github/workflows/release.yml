name: Release

on:
  pull_request:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  changesets:
    name: Changesets
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Node Modules Cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Checkout nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install Deps
        run: bun ci

      - name: Install scanning secrets tools
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          cd ${{ runner.temp }} && git clone https://github.com/gitleaks/gitleaks.git && cd gitleaks && make build
          sudo install -m 0755 ${{ runner.temp }}/gitleaks /usr/local/bin

      - name: Check tools
        run: |
          which trufflehog
          which gitleaks

      - name: Create Release Pull Request
        if: github.event_name == 'push'
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm:
    name: npmjs.com
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Node Modules Cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Checkout nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install Deps
        run: bun ci

      - name: Publish
        shell: bash
        run: scripts/npm-publish.sh

  jsr:
    name: jsr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Node Modules Cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Checkout nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install Deps
        run: bun ci

      - name: Publish
        working-directory: ./lib/distopia
        run: npx jsr publish ${{ github.event_name == 'pull_request' && '--dry-run' || '' }}
