name: Setup

description: Setup for distopia

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Generate .env
      shell: bash
      run: printenv > .env

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build with GHA cache
      uses: docker/build-push-action@v7
      with:
        context: ./docker
        push: false
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Cache Bun install
      uses: actions/cache@v6
      with:
        path: .cache/bun/install
        key: ${{ runner.os }}-cache-${{ hashFiles('**/bun.lock') }}

    - name: Cache Playwright browsers
      uses: actions/cache@v6
      with:
        path: .cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('src/presentation/web/package.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Checkout Container
      working-directory: ./docker/
      shell: bash
      run: |
        docker volume create distopia-db-store
        docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
