name: Setup

description: Setup for distopia

inputs:
  ref:
    description: Git ref to check out (defaults to the triggering event's ref/sha)
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        persist-credentials: false

    - name: Generate .env
      shell: bash
      run: printenv > .env

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build with GHA cache
      uses: docker/build-push-action@v7
      with:
        context: ./docker
        push: false
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Cache Bun install
      uses: actions/cache@v6
      with:
        path: .cache/bun/install
        key: ${{ runner.os }}-bun-install-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-install-

    - name: Cache Turbo
      uses: actions/cache@v6
      with:
        path: .cache/turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Checkout Container
      working-directory: ./docker/
      shell: bash
      run: |
        docker volume create distopia-db-store
        docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
